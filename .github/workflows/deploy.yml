name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository 🛎️
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      
      - name: Set up Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install Dependencies 🔧
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Fetch @barrys27/ui 📥
        run: |
          mkdir -p static/css
          curl -sLo static/css/barrys27-ui.scss https://unpkg.com/@barrys27/ui@latest/src/scss/main.scss

      - name: Compile SCSS 🎨
        run: |
          python scss.py

      - name: Build Static Site 🏗️
        run: |
          python freeze.py
      
      - name: Verify Build 🔍
        run: |
          if [ ! -f "build/index.html" ]; then
            echo "❌ Build verification failed: index.html not found"
            exit 1
          fi
          if [ ! -f "build/static/css/styles.css" ]; then
            echo "❌ Build verification failed: styles.css not found"
            exit 1
          fi
          echo "✅ Build verification passed"
      
      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          single-commit: true
